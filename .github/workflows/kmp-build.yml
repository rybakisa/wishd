name: KMP Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Compile shared (Android)
        run: ./gradlew :clients:shared:compileDebugKotlinAndroid

      - name: Run shared tests (JVM)
        run: ./gradlew :clients:shared:allTests

      - name: Build Android APK
        run: ./gradlew :clients:android:assembleDebug

  build-ios:
    name: Compile KMP iOS Framework
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Compile shared (iOS Arm64)
        run: ./gradlew :clients:shared:compileKotlinIosArm64

      - name: Compile shared (iOS Simulator)
        run: ./gradlew :clients:shared:compileKotlinIosSimulatorArm64
